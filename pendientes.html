<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pendientes</title>
    <link rel="stylesheet" href="sources/css/pen_styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="top">
      <input type="checkbox" class="menu-toggle top" id="show-menu" />
      <label for="show-menu">
        <i class="fa-solid fa-bars" id="bars"></i>
      </label>
      <nav class="menu">
        <ul>
          <li><a href="#">🏠 Inicio</a></li>
          <li><a href="#">📶 Reportes</a></li>
          <li><a href="#">🧰 Gestión</a></li>
          <li><a href="#">⚙️ pendientes</a></li>
        </ul>
        <a id="log-out" href="index.html">🚪 Salir</a>
      </nav>
    </div>

    <div class="head"><h1>PANEL DE GESTION DE PEDIENTES</h1></div>
    <div class="permisse">
      <label for="permisse">Solicitud de permisos</label>
      <button>Crear nueva solicitud</button>
      <div id="overlay" class="overlay">
        <div class="modal-container"></div>
      </div>
    </div>
    <div class="vacation">
      <label for="vacation">Solicitud en espera</label>
    </div>
    <div class="table">
      <table class="solicit-table">
        <thead>
          <tr>
            <th>folio</th>
            <th>Empleado(ID/Nombre)</th>
            <th>Tipo de solicitud</th>
            <th>Fecha solicitada</th>
            <th>Dias/horas</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="search">
      <form action="">
        <select name="type-solicited" id="type-solicited">
          <option value="" selected>Tipo de solicitud</option>
          <option value="permiso">Persmiso</option>
          <option value="vacacion">Vacaciones</option>
        </select>
        <label for="type-solicited"
          ><i class="fa-solid fa-angle-down"></i
        ></label>
        <input type="search" placeholder="Buscar..." class="searcher" />
        <button type="submit" id="search-button">
          <i class="fa fa-search"></i>
        </button>
      </form>
    </div>
  </body>
</html>
